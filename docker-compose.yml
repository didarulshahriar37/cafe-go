version: '3.8'

services:
  gateway-service:
    build:
      context: ./backend/gateway-service
      dockerfile: Dockerfile
    container_name: gateway-service
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - PORT=8080
      - STOCK_SERVICE_URL=http://stock-service:3001
      - KITCHEN_SERVICE_URL=http://kitchen-service:3002
    networks:
      - cafe-network
    restart: unless-stopped
    depends_on:
      - stock-service
      - kitchen-service

  stock-service:
    build:
      context: ./backend/stock-service
      dockerfile: Dockerfile
    container_name: stock-service
    expose:
      - "3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - MONGO_URI=mongodb://mongo:27017/cafe_inventory
      - REDIS_URL=redis://redis:6379
      - RABBITMQ_URL=amqp://admin:admin123@rabbitmq:5672
    networks:
      - cafe-network
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_started
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started

  kitchen-service:
    build:
      context: ./backend/kitchen-service
      dockerfile: Dockerfile
    container_name: kitchen-service
    expose:
      - "3002"
    environment:
      - NODE_ENV=production
      - PORT=3002
      - MONGO_URI=mongodb://mongo:27017/cafe_orders
      - REDIS_URL=redis://redis:6379
      - RABBITMQ_URL=amqp://admin:admin123@rabbitmq:5672
    networks:
      - cafe-network
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_started
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started

  notification-service:
    build:
      context: ./backend/notification-service
      dockerfile: Dockerfile
    container_name: notification-service
    expose:
      - "3003"
    environment:
      - NODE_ENV=production
      - PORT=3003
      - RABBITMQ_URL=amqp://admin:admin123@rabbitmq:5672
    networks:
      - cafe-network
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_started

  mongo:
    image: mongo:6
    container_name: mongo-db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - cafe-network
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: redis-cache
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - cafe-network
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq-broker
    environment:
      - RABBITMQ_DEFAULT_USER=admin
      - RABBITMQ_DEFAULT_PASS=admin123
    ports:
      - "5672:5672"   # AMQP protocol port
      - "15672:15672" # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - cafe-network
    restart: unless-stopped

networks:
  cafe-network:
    driver: bridge
    name: cafe-network

volumes:
  mongo_data:
  redis_data:
  rabbitmq_data:
